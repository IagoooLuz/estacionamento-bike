<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Park Pro - Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --accent: #2ec4b6; --bg: #f8f9fc; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #333; }
        
        .navbar { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 0.8rem 0; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .form-label { font-size: 0.65rem; font-weight: 800; color: #6c757d; text-transform: uppercase; }
        .form-control, .form-select { border-radius: 10px; border: 1px solid #e0e7ff; font-size: 0.85rem; }

        .table thead th { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; padding: 15px; border-bottom: 2px solid #f1f5f9; }
        .badge-valor { font-size: 1rem; font-weight: 800; color: var(--accent); }
        
        .card-stats { border-left: 5px solid var(--accent); }
        .btn-excel { background: #1d7244; color: white; border: none; font-weight: 700; border-radius: 12px; transition: 0.3s; }
        .btn-excel:hover { background: #155d37; transform: translateY(-2px); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand fw-bold h4 mb-0">
            <i class="fa-solid fa-chart-line me-2"></i> FINANCEIRO & RELATÓRIOS
        </span>
        <a href="index.html" class="btn btn-light btn-sm fw-bold px-4 rounded-pill shadow-sm">
            <i class="fa-solid fa-arrow-left me-1"></i> VOLTAR AO PÁTIO
        </a>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card card-stats p-4 h-100">
                <div class="small fw-bold text-muted mb-1">FATURAMENTO TOTAL</div>
                <h2 class="fw-bold text-primary mb-0" id="totalGeral">R$ 0,00</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-4 h-100" style="border-left: 5px solid var(--primary);">
                <div class="small fw-bold text-muted mb-1">VEÍCULOS FINALIZADOS</div>
                <h2 class="fw-bold mb-0" id="totalFinalizados">0</h2>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4 h-100">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Filtrar por Nome ou Ficha</label>
                        <input type="text" id="filtroBusca" class="form-control" placeholder="Ex: Iago ou 005" oninput="processarRelatorio()">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Ordenar por</label>
                        <select id="ordenacaoSelect" class="form-select" onchange="processarRelatorio()">
                            <option value="dataRecente">Data (Recentes)</option>
                            <option value="dataAntiga">Data (Antigas)</option>
                            <option value="maiorValor">Maior Valor</option>
                            <option value="menorValor">Menor Valor</option>
                            <option value="ficha">Número da Ficha</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card overflow-hidden">
        <div class="p-3 bg-white border-bottom d-flex justify-content-between align-items-center">
            <h6 class="fw-bold mb-0 text-muted text-uppercase" style="font-size: 0.75rem;">Histórico de Movimentação</h6>
            <button onclick="exportarExcel()" class="btn btn-excel btn-sm px-4">
                <i class="fa-solid fa-file-excel me-1"></i> EXPORTAR EXCEL
            </button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle text-center" id="tabelaFinanceira">
                <thead class="table-light">
                    <tr>
                        <th style="width: 100px;">Ficha</th>
                        <th class="text-start">Dono</th>
                        <th>Entrada</th>
                        <th>Saída</th>
                        <th>Permanência</th>
                        <th>Valor Pago</th>
                    </tr>
                </thead>
                <tbody id="corpoRelatorio"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    let todosOsDados = [];

    async function buscarDados() {
        try {
            const res = await fetch('/registros');
            const data = await res.json();
            // Filtramos apenas os que já saíram para o financeiro
            todosOsDados = data.filter(r => r.saida);
            processarRelatorio();
        } catch (e) {
            console.error("Erro ao carregar dados:", e);
        }
    }

    function processarRelatorio() {
        let dadosFiltrados = [...todosOsDados];
        const busca = document.getElementById('filtroBusca').value.toLowerCase();
        const ordem = document.getElementById('ordenacaoSelect').value;

        // 1. FILTRAGEM
        if (busca) {
            dadosFiltrados = dadosFiltrados.filter(r => 
                r.nomeUsuario.toLowerCase().includes(busca) || 
                r.identificacao.includes(busca)
            );
        }

        // 2. ORDENAÇÃO
        dadosFiltrados.sort((a, b) => {
            if (ordem === 'dataRecente') return new Date(b.saida) - new Date(a.saida);
            if (ordem === 'dataAntiga') return new Date(a.saida) - new Date(b.saida);
            if (ordem === 'maiorValor') return b.valorTotal - a.valorTotal;
            if (ordem === 'menorValor') return a.valorTotal - b.valorTotal;
            if (ordem === 'ficha') return parseInt(a.identificacao) - parseInt(b.identificacao);
            return 0;
        });

        renderizarTabela(dadosFiltrados);
    }

    function renderizarTabela(dados) {
        const corpo = document.getElementById('corpoRelatorio');
        let faturamento = 0;
        corpo.innerHTML = '';

        dados.forEach(r => {
            faturamento += r.valorTotal;
            
            // Cálculo de permanência (Horas)
            const diffMs = new Date(r.saida) - new Date(r.entrada);
            const totalMinutos = Math.floor(diffMs / (1000 * 60));
            const horas = Math.floor(totalMinutos / 60);
            const minutos = totalMinutos % 60;
            const permanencia = `${horas}h ${minutos}min`;

            corpo.innerHTML += `
                <tr>
                    <td><span class="badge bg-light text-dark border px-3 fw-bold">#${r.identificacao}</span></td>
                    <td class="text-start fw-bold">${r.nomeUsuario}</td>
                    <td><small class="text-muted">${new Date(r.entrada).toLocaleString()}</small></td>
                    <td><small class="text-muted">${new Date(r.saida).toLocaleString()}</small></td>
                    <td><span class="badge bg-info-subtle text-info-emphasis border border-info-subtle px-2">${permanencia}</span></td>
                    <td class="badge-valor">R$ ${r.valorTotal.toFixed(2)}</td>
                </tr>`;
        });

        document.getElementById('totalGeral').innerText = `R$ ${faturamento.toFixed(2)}`;
        document.getElementById('totalFinalizados').innerText = dados.length;
    }

    function exportarExcel() {
        const wb = XLSX.utils.table_to_book(document.getElementById('tabelaFinanceira'), { sheet: "Financeiro" });
        XLSX.writeFile(wb, `Relatorio_BikePark_${new Date().toLocaleDateString()}.xlsx`);
    }

    // Inicia a busca ao carregar a página
    buscarDados();
</script>
</body>
</html>
