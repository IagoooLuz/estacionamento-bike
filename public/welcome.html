        .main-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        
        .welcome-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 700px;
            animation: fadeIn 1s ease-out;
        }
        
        .logo-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 3.5rem;
            letter-spacing: -2px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .bike-icon-large {
            font-size: 5rem;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            animation: bikeBounce 2s infinite ease-in-out;
        }
        
        .feature-icon {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0 1rem;
            transition: 0.3s;
        }
        .feature-icon:hover {
            color: var(--accent-color);
            transform: scale(1.2);
        }
        
        .btn-enter {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            padding: 1.2rem 3rem;
            font-weight: 700;
            font-size: 1.2rem;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(67, 97, 238, 0.4);
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 2rem;
        }
        
        .btn-enter:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(67, 97, 238, 0.6);
            color: white;
        }
        
        /* ANIMAÇÕES */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes bikeBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .footer-credits {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }

    <div class="bike-pattern"></div>

    <div class="container main-container">
        <div class="welcome-card">
            <i class="fa-solid fa-bicycle bike-icon-large"></i>
            <h1 class="logo-title">BIKE PARK <span class="fw-light">PRO</span></h1>
            <p class="text-muted text-uppercase small fw-bold letter-spacing mb-4">Gestão de Estacionamento & Pátio</p>
            
            <p class="lead text-white-50 mb-4">
                Bem-vindo ao software de gestão mais rápido, intuitivo e seguro para ciclistas e operadores de pátio. Controle entradas, saídas e faturamento em tempo real.
            </p>
            
            <div class="d-flex justify-content-center mb-4">
                <i class="fa-solid fa- warehouse feature-icon" title="Ocupação em Tempo Real"></i>
                <i class="fa-solid fa-receipt feature-icon" title="Cálculo Automático"></i>
                <i class="fa-solid fa-chart-pie feature-icon" title="Relatórios Financeiros"></i>
                <i class="fa-solid fa-check-double feature-icon" title="Segurança"></i>
            </div>
            
            <a href="index.html" class="btn-enter">
                ACESSAR O PÁTIO AGORA <i class="fa-solid fa-arrow-right ms-2"></i>
            </a>
        </div>
    </div>

    <div class="footer-credits">
        Projeto de Programação I - 1º Semestre de 2026
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
