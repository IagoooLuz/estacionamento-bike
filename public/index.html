<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Park Pro - Operações</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --accent: #2ec4b6; --bg: #f8f9fc; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #333; overflow-x: hidden; }
        
        /* Animação da Bike */
        @keyframes bikeMove {
            0% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(-5deg); }
            50% { transform: translateX(2px) rotate(0deg); }
            75% { transform: translateY(-3px) rotate(5deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }
        .bike-anim { display: inline-block; animation: bikeMove 2.5s infinite linear; color: #fff; margin-right: 10px; }

        .navbar { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 0.8rem 0; border: none; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Labels e Inputs */
        .form-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; }
        .text-required { color: #e63946 !important; }
        .form-control, .form-select { font-size: 0.85rem; border-radius: 10px; border: 1px solid #e0e7ff; padding: 0.6rem; }
        
        .btn-registrar { background-color: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 700; height: 45px; transition: 0.3s; }
        .btn-registrar:hover { background-color: #26a69a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46,196,182,0.4); color: white; }
        
        .input-group .btn { border-color: #e0e7ff; color: var(--primary); background: #fff; }
        .badge-ficha { background: #f0f3ff; color: var(--primary); font-weight: 800; padding: 6px 12px; border-radius: 10px; border: 1px solid #e0e7ff; }
        .text-detalhes { font-size: 0.75rem; color: #7f8c8d; font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="welcome.html" class="navbar-brand fw-bold h4 mb-0 text-decoration-none">
            <i class="fa-solid fa-bicycle bike-anim"></i> BIKE PARK PRO
        </a>
        <a href="relatorio.html" class="btn btn-light btn-sm fw-bold px-4 rounded-pill shadow-sm">
            <i class="fa-solid fa-chart-line me-1"></i> FINANCEIRO
        </a>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3 text-primary"><i class="fa-solid fa-plus-circle me-2"></i>NOVA ENTRADA NO PÁTIO</h6>
        <div class="row g-3 align-items-end">
            <div class="col-md-1">
                <label class="form-label">Ficha</label>
                <input type="text" id="identificacao" class="form-control text-center fw-bold bg-light" readonly>
            </div>
            <div class="col-md-2">
                <label class="form-label text-required">Dono *</label>
                <input type="text" id="nomeUsuario" class="form-control" placeholder="Ex: Iago Luz">
            </div>
            <div class="col-md-2">
                <label class="form-label text-required">Categoria *</label>
                <div class="input-group">
                    <select id="categoriaSelect" class="form-select"></select>
                    <button class="btn btn-outline-primary" onclick="abrirModal('categorias')">+</button>
                </div>
            </div>
            <div class="col-md-2">
                <label class="form-label text-required">Marca *</label>
                <div class="input-group">
                    <select id="marcaSelect" class="form-select"></select>
                    <button class="btn btn-outline-primary" onclick="abrirModal('marcas')">+</button>
                </div>
            </div>
            <div class="col-md-1">
                <label class="form-label text-required">Cor *</label>
                <div class="input-group">
                    <select id="corSelect" class="form-select"></select>
                    <button class="btn btn-outline-primary" onclick="abrirModal('cores')">+</button>
                </div>
            </div>
            <div class="col-md-2">
                <label class="form-label text-required">Aro *</label>
                <div class="input-group">
                    <select id="aroSelect" class="form-select"></select>
                    <button class="btn btn-outline-primary" onclick="abrirModal('aros')">+</button>
                </div>
            </div>
            <div class="col-md-2">
                <button onclick="registrarEntrada()" class="btn btn-registrar w-100">
                    <i class="fa-solid fa-play me-2"></i>REGISTRAR
                </button>
            </div>
        </div>
    </div>

    <div class="card overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle text-center">
                <thead class="table-light">
                    <tr>
                        <th style="width: 100px;">Ficha</th>
                        <th class="text-start">Dono</th>
                        <th class="text-start">Especificações (Marca/Cor/Aro)</th>
                        <th>Categoria</th>
                        <th>Horário</th>
                        <th style="width: 120px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-ativos"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCad" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content p-4 border-0 shadow-lg" style="border-radius: 25px;">
            <h5 class="fw-bold text-center mb-3 text-primary" id="mTitulo">Cadastrar</h5>
            <input type="text" id="mNome" class="form-control mb-3 text-uppercase" placeholder="Nome...">
            <div id="mPrecoDiv" class="d-none">
                <label class="form-label text-muted">Preço por Hora (R$)</label>
                <input type="text" id="mPreco" class="form-control mb-3" placeholder="0.00">
            </div>
            <button class="btn btn-primary w-100 fw-bold rounded-pill" onclick="salvarNovo()">SALVAR</button>
        </div>
    </div>
</div>

<div class="modal fade" id="modalSuc" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm text-center">
        <div class="modal-content p-5 border-0 shadow-lg" style="border-radius: 30px;">
            <i class="fa-solid fa-circle-check text-success display-3 mb-3"></i>
            <h6 class="fw-bold text-muted">TOTAL PAGO</h6>
            <h2 class="text-success fw-bold my-3" id="vFinal">R$ 0,00</h2>
            <button class="btn btn-dark w-100 rounded-pill fw-bold" onclick="location.reload()">OK</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let rotaAtual = '';
    const mCad = new bootstrap.Modal(document.getElementById('modalCad'));
    const mSuc = new bootstrap.Modal(document.getElementById('modalSuc'));

    function abrirModal(rota) {
        rotaAtual = rota;
        document.getElementById('mTitulo').innerText = "Novo(a) " + rota.slice(0,-1).toUpperCase();
        document.getElementById('mNome').value = '';
        document.getElementById('mPreco').value = '';
        document.getElementById('mPrecoDiv').classList.toggle('d-none', rota !== 'categorias');
        mCad.show();
    }

    async function salvarNovo() {
        const nome = document.getElementById('mNome').value.toUpperCase();
        if(!nome) return;
        const body = { nome };
        if(rotaAtual === 'categorias') body.valorHora = parseFloat(document.getElementById('mPreco').value.replace(',', '.')) || 0;
        await fetch(`/${rotaAtual}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        mCad.hide();
        await carregarDados();
    }

    async function carregarDados() {
        try {
            const resF = await fetch('/proxima-ficha');
            const dataF = await resF.json();
            document.getElementById('identificacao').value = dataF.proxima;
        } catch (e) { document.getElementById('identificacao').value = '001'; }

        const sel = (id) => document.getElementById(id).value;
        const s1 = sel('categoriaSelect'), s2 = sel('marcaSelect'), s3 = sel('corSelect'), s4 = sel('aroSelect');

        const popular = async (rota, id, ant) => {
            try {
                const res = await fetch(`/${rota}`);
                const dados = await res.json();
                const s = document.getElementById(id);
                s.innerHTML = `<option value="" disabled selected>${rota.slice(0,3).toUpperCase()}...</option>`;
                dados.forEach(d => s.innerHTML += `<option value="${d.id}">${d.nome}</option>`);
                if(ant) s.value = ant;
            } catch (e) {}
        }
        await popular('categorias', 'categoriaSelect', s1);
        await popular('marcas', 'marcaSelect', s2);
        await popular('cores', 'corSelect', s3);
        await popular('aros', 'aroSelect', s4);
    }

    async function listarAtivos() {
        try {
            const res = await fetch('/registros');
            const logs = await res.json();
            const corpo = document.getElementById('tabela-ativos');
            corpo.innerHTML = '';
            logs.filter(r => !r.saida).forEach(r => {
                const desc = `${r.mrc?r.mrc.nome:'-'} • ${r.corRel?r.corRel.nome:'-'} • ARO ${r.aroRel?r.aroRel.nome:'-'}`;
                corpo.innerHTML += `
                    <tr>
                        <td><span class="badge-ficha">#${r.identificacao}</span></td>
                        <td class="text-start fw-bold">${r.nomeUsuario}</td>
                        <td class="text-start text-detalhes text-uppercase">${desc}</td>
                        <td><span class="badge bg-primary rounded-pill px-3">${r.cat?r.cat.nome:'-'}</span></td>
                        <td><div class="small fw-bold text-muted">${new Date(r.entrada).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></td>
                        <td><button onclick="darSaida(${r.id})" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">SAÍDA</button></td>
                    </tr>`;
            });
        } catch (e) {}
    }

    async function registrarEntrada() {
        const body = {
            identificacao: document.getElementById('identificacao').value,
            nomeUsuario: document.getElementById('nomeUsuario').value,
            CategoriaId: document.getElementById('categoriaSelect').value,
            MarcaId: document.getElementById('marcaSelect').value,
            CorId: document.getElementById('corSelect').value,
            AroId: document.getElementById('aroSelect').value
        };

        // VALIDAÇÃO RIGOROSA: Se algum campo estiver vazio (null ou string vazia), ele trava.
        if(!body.nomeUsuario || !body.CategoriaId || !body.MarcaId || !body.CorId || !body.AroId) {
            alert("⚠️ ATENÇÃO: Todos os campos com asterisco (*) são obrigatórios!");
            return;
        }

        const res = await fetch('/registros', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(body) 
        });

        if(res.ok) location.reload();
        else alert("Erro ao salvar. Verifique se as categorias/marcas foram cadastradas corretamente.");
    }

    async function darSaida(id) {
        const res = await fetch(`/registros/${id}`, { method: 'PUT' });
        const d = await res.json();
        document.getElementById('vFinal').innerText = `R$ ${d.valorTotal.toFixed(2)}`;
        mSuc.show();
    }

    carregarDados(); listarAtivos();
</script>
</body>
</html>
