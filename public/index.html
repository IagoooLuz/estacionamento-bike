<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Park Pro - Pátio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --primary-color: #4361ee; --secondary-color: #3f37c9; --accent-color: #2ec4b6; --bg-body: #f8f9fc; --danger-color: #e63946; }
        body { background-color: var(--bg-body); font-family: 'Inter', sans-serif; color: #333; overflow-x: hidden; }
        
        .navbar { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); padding: 1rem 0; border: none; }
        .navbar-brand { font-weight: 700; transition: 0.3s; display: flex; align-items: center; }

        .bike-icon-animate {
            color: #fff; /* Padronizado: Branco na Navbar */
            margin-right: 12px;
            display: inline-block;
            animation: bikeBounceIndex 2s infinite ease-in-out;
        }

        @keyframes bikeBounceIndex {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Cards e Layout Padronizados */
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); animation: slideUp 0.6s ease-out; }
        .stat-card { border-left: 6px solid var(--primary-color); position: relative; overflow: hidden; }
        .stat-icon { position: absolute; right: 15px; bottom: 10px; font-size: 3rem; opacity: 0.1; color: var(--primary-color); }
        .price-dash { background: #fff; border: 2px dashed #dee2e6; border-radius: 15px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Formulário */
        .form-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; margin-bottom: 5px; font-weight: 600; }
        .label-required { color: var(--danger-color) !important; font-weight: 700 !important; }
        .form-control, .form-select { border-radius: 12px; border: 1px solid #e0e7ff; padding: 0.7rem; font-size: 0.9rem; }
        .uppercase-input { text-transform: uppercase; }

        /* Botões */
        .btn-success { background-color: var(--accent-color); border: none; border-radius: 12px; padding: 0.8rem; font-weight: 700; transition: 0.3s; color: #fff; }
        .btn-success:hover { background-color: #26a69a; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(46, 196, 182, 0.3); color: #fff; }
        
        /* Tabela */
        .table { background: white; border-radius: 20px; vertical-align: middle; }
        .badge-ficha { background: #f0f3ff; color: var(--primary-color); font-weight: 800; border: 1px solid #e0e7ff; padding: 0.6rem 0.8rem; border-radius: 10px; }
        .badge-cor-dinamica { color: white !important; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.4); padding: 0.5rem 1rem; border-radius: 50px; }

        .modal-content { border-radius: 25px; border: none; }
        .modal-header { border-radius: 25px 25px 0 0; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark shadow-lg mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="welcome.html" class="navbar-brand h1 mb-0 text-decoration-none" title="Voltar ao Início">
                <i class="fa-solid fa-bicycle bike-icon-animate"></i> 
                <span>BIKE PARK <span class="fw-light">PRO</span></span>
            </a>
            <a href="relatorio.html" class="btn btn-light btn-sm fw-bold px-4 rounded-pill shadow-sm">
                <i class="fa-solid fa-chart-line me-1"></i> FINANCEIRO
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4 g-3">
            <div class="col-md-4">
                <div class="card stat-card p-4 h-100 bg-white">
                    <h6 class="small mb-1 fw-bold text-muted">OCUPAÇÃO</h6>
                    <h2 class="mb-0 fw-bold text-dark" id="totalNoPatio">0</h2>
                    <i class="fa-solid fa-warehouse stat-icon"></i>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-3 h-100 shadow-sm price-dash d-flex align-items-center justify-content-center">
                    <div class="d-flex align-items-center gap-3">
                        <span class="text-muted small fw-bold">VALOR PADRÃO (R$):</span>
                        <input type="number" id="valorPadraoDia" class="form-control form-control-sm fw-bold text-primary text-center" value="5.00" style="width: 85px;" onchange="sincronizarValor()">
                        <span class="text-muted mx-2">|</span>
                        <span class="text-muted small fw-bold">FICHA:</span>
                        <h4 class="text-primary fw-bold mb-0" id="badgeProximaFicha">---</h4>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4 p-4">
            <div class="row g-2 align-items-end">
                <div class="col-md-1">
                    <label class="form-label">Ficha</label>
                    <input type="text" id="identificacao" class="form-control bg-light fw-bold text-center" readonly>
                </div>
                <div class="col-md-2">
                    <label class="form-label label-required">Marca *</label>
                    <div class="input-group">
                        <select id="marcaSelect" class="form-select uppercase-input"></select>
                        <input type="text" id="marcaInput" class="form-control d-none uppercase-input">
                        <button class="btn btn-outline-primary" type="button" onclick="alternar('marca')"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label label-required">Cor *</label>
                    <div class="input-group">
                        <select id="corSelect" class="form-select uppercase-input"></select>
                        <input type="text" id="corInput" class="form-control d-none uppercase-input">
                        <button class="btn btn-outline-primary" type="button" onclick="alternar('cor')"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label label-required">Aro *</label>
                    <div class="input-group">
                        <select id="aroSelect" class="form-select"></select>
                        <input type="text" id="aroInput" class="form-control d-none">
                        <button class="btn btn-outline-primary" type="button" onclick="alternar('aro')"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Modelo</label>
                    <input type="text" id="descricao" class="form-control uppercase-input" placeholder="Ex: Caloi 10">
                </div>
                <div class="col-md-1">
                    <label class="form-label">R$/Hora</label>
                    <input type="number" id="valorHoraEntrada" class="form-control fw-bold text-primary" value="5.00">
                </div>
                <div class="col-md-2">
                    <button type="button" onclick="registrarEntrada()" class="btn btn-success w-100 shadow-sm">ENTRADA</button>
                </div>
            </div>
            <div class="mt-3">
                <input type="text" id="observacao" class="form-control form-control-sm" placeholder="Observações de entrada...">
            </div>
        </div>

        <div class="card shadow-sm border-0 overflow-hidden mb-5">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                        <tr class="table-light">
                            <th class="ps-4">Ficha</th>
                            <th>Veículo</th>
                            <th>Valor/H</th>
                            <th>Entrada</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSaida" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header bg-danger text-white"><h5 class="modal-title">Finalizar Saída</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body p-4 text-center"><textarea id="obsSaidaFinal" class="form-control mb-3" rows="2" placeholder="Notas de pagamento..."></textarea><button type="button" class="btn btn-danger w-100" onclick="confirmarSaida()">CONFIRMAR</button></div></div></div>
    </div>

    <div class="modal fade" id="modalSucesso" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm"><div class="modal-content shadow-lg border-0 text-center"><div class="modal-body p-5"><i class="fa-solid fa-circle-check text-success mb-3" style="font-size:4rem"></i><h4>SAÍDA CONCLUÍDA</h4><p class="text-muted">Total:</p><h2 class="text-success fw-bold" id="valorFinalRecibo"></h2><button type="button" class="btn btn-dark w-100 rounded-pill mt-4" data-bs-dismiss="modal">OK</button></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let flags = { marca: false, cor: false, aro: false };
        let idParaSair = null;
        let instanciaModal = null;
        let instanciaSucesso = null;

        function obterCorHex(cor) {
            const cores = { 'PRETA': '#212529', 'BRANCA': '#adb5bd', 'AZUL': '#4361ee', 'VERMELHA': '#e63946', 'VERDE': '#2a9d8f', 'AMARELA': '#ffb703', 'LARANJA': '#fb8500', 'ROSA': '#ff006e' };
            return cores[cor.toUpperCase()] || '#6c757d';
        }

        function sincronizarValor() { document.getElementById('valorHoraEntrada').value = document.getElementById('valorPadraoDia').value; }
        function alternar(tipo) { flags[tipo] = !flags[tipo]; document.getElementById(`${tipo}Select`).classList.toggle('d-none'); document.getElementById(`${tipo}Input`).classList.toggle('d-none'); }

        async function listarBikes() {
            const res = await fetch('/bikes-ativas'); const bikes = await res.json();
            const corpo = document.getElementById('tabela-corpo'); corpo.innerHTML = '';
            document.getElementById('totalNoPatio').innerText = bikes.length;
            bikes.forEach(b => {
                corpo.innerHTML += `<tr><td class="ps-4"><span class="badge-ficha">#${b.identificacao}</span></td><td><div class="fw-bold">${b.marca}</div><span class="badge rounded-pill badge-cor-dinamica small" style="background-color:${obterCorHex(b.cor)}">${b.cor}</span> <span class="badge rounded-pill bg-light text-dark border small">ARO ${b.aro}</span></td><td><span class="text-primary fw-bold">R$ ${b.valorHora.toFixed(2)}</span></td><td><div class="small fw-bold">${new Date(b.entrada).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div></td><td class="text-center"><button onclick="prepararSaida(${b.id})" class="btn btn-outline-danger btn-sm rounded-pill px-3">SAÍDA</button></td></tr>`;
            });
            carregarDados();
        }

        async function carregarDados() {
            const fetcher = async (url, id, p) => { const r = await fetch(url); const d = await r.json(); const s = document.getElementById(id); s.innerHTML = `<option value="" selected disabled>${p}</option>`; d.forEach(x => s.innerHTML += `<option value="${x.nome || x.tamanho}">${x.nome || x.tamanho}</option>`); };
            await fetcher('/marcas', 'marcaSelect', 'MARCA...'); await fetcher('/cores', 'corSelect', 'COR...'); await fetcher('/aros', 'aroSelect', 'ARO...');
            const rf = await fetch('/proxima-ficha'); const df = await rf.json(); document.getElementById('identificacao').value = df.proxima; document.getElementById('badgeProximaFicha').innerText = df.proxima;
        }

        async function registrarEntrada() {
            const v = (t) => flags[t] ? document.getElementById(`${t}Input`).value.trim().toUpperCase() : document.getElementById(`${t}Select`).value;
            const marca = v('marca'), cor = v('cor'), aro = v('aro');
            if(!marca || !cor || !aro) return alert("Preencha Marca, Cor e Aro!");
            await fetch('/entrada', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ identificacao: document.getElementById('identificacao').value, marca, cor, aro, descricao: document.getElementById('descricao').value, observacao: document.getElementById('observacao').value, valorHora: document.getElementById('valorHoraEntrada').value }) });
            ['descricao', 'observacao', 'marcaInput', 'corInput', 'aroInput'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value = ''; });
            listarBikes();
        }

        function prepararSaida(id) { idParaSair = id; if(!instanciaModal) instanciaModal = new bootstrap.Modal(document.getElementById('modalSaida')); instanciaModal.show(); }
        async function confirmarSaida() {
            const obs = document.getElementById('obsSaidaFinal').value;
            const res = await fetch(`/saida/${idParaSair}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ observacaoFinal: obs }) });
            if(res.ok) { const d = await res.json(); instanciaModal.hide(); document.getElementById('valorFinalRecibo').innerText = `R$ ${d.valor.toFixed(2)}`; if(!instanciaSucesso) instanciaSucesso = new bootstrap.Modal(document.getElementById('modalSucesso')); instanciaSucesso.show(); listarBikes(); }
        }

        listarBikes();
    </script>
</body>
</html>
